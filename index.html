<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教義比較マトリクス — 基督教入門ナビ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #b8956a;
  --gold-light: #d4b483;
  --parchment: #faf6f0;
  --parchment-dim: rgba(240,232,218,0.75);
  --parchment-faint: rgba(240,232,218,0.45);
  --ink: #1a1410;
  --card-bg: rgba(255,255,255,0.03);
  --border: rgba(184,149,106,0.18);

  --c-catholic: #4a6e8a;
  --c-orthodox: #8a6040;
  --c-anglican: #2d5a3d;
  --c-lutheran: #7a5a3d;
  --c-reformed: #3d4a7a;
  --c-evangelical: #7a6a3d;
  --c-pentecostal: #8a3d3d;
  --c-solo: #5a5a5a;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--ink);
  color: var(--parchment);
  min-height: 100vh;
  overflow-x: hidden;
}

.bg-layer {
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, #2c1f0e 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 100% 100%, #0d1a2a 0%, transparent 60%),
    linear-gradient(160deg, #0f0b07 0%, #1a1008 40%, #0a1018 100%);
  z-index: 0;
}

.wrap {
  position: relative; z-index: 1;
  max-width: 1000px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

/* HEADER */
.page-header {
  text-align: center;
  padding: 40px 0 36px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 40px;
}
.eyebrow {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px; letter-spacing: 0.35em; text-transform: uppercase;
  color: var(--gold); opacity: 0.7; margin-bottom: 14px;
}
.page-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(26px, 5vw, 42px);
  font-weight: 300; letter-spacing: 0.04em; color: var(--parchment);
  line-height: 1.3; margin-bottom: 10px;
}
.page-title em { color: var(--gold); font-style: italic; }
.page-sub {
  font-size: 13px; font-weight: 300;
  color: var(--parchment-faint); letter-spacing: 0.04em;
}

/* NAV LINK */
.nav-back {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 300;
  color: var(--gold); opacity: 0.7;
  text-decoration: none; letter-spacing: 0.08em;
  margin-bottom: 32px;
  transition: opacity 0.2s;
}
.nav-back:hover { opacity: 1; }

/* FILTER BAR */
.filter-bar {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-bottom: 32px;
}
.filter-btn {
  padding: 7px 16px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 2px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px; font-weight: 300;
  color: var(--parchment-faint);
  cursor: pointer; letter-spacing: 0.04em;
  transition: all 0.2s ease;
}
.filter-btn:hover { border-color: var(--gold); color: var(--parchment-dim); }
.filter-btn.active {
  border-color: var(--gold);
  background: rgba(184,149,106,0.12);
  color: var(--gold);
}

/* SECTION LABEL */
.section-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--gold); opacity: 0.55;
  margin-bottom: 20px;
}

/* DENOMINATION HEADER ROW */
.denom-header {
  display: grid;
  grid-template-columns: 200px repeat(8, 1fr);
  gap: 0;
  margin-bottom: 2px;
  position: sticky; top: 0; z-index: 10;
  background: #0f0b07;
  border-bottom: 1px solid var(--border);
  padding: 12px 0 10px;
}
.denom-header-cell {
  text-align: center;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 11px; font-weight: 400;
  letter-spacing: 0.02em;
  padding: 0 4px;
  line-height: 1.4;
}
.denom-header-cell .denom-icon { font-size: 16px; display: block; margin-bottom: 4px; }
.denom-header-cell .denom-abbr { font-size: 10px; opacity: 0.65; }

/* THEME GROUP */
.theme-group { margin-bottom: 32px; }
.theme-group-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px; font-weight: 400;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--gold); opacity: 0.55;
  padding: 8px 0 6px;
  border-top: 1px solid rgba(184,149,106,0.1);
  margin-bottom: 4px;
}

/* MATRIX ROW */
.matrix-row {
  display: grid;
  grid-template-columns: 200px repeat(8, 1fr);
  gap: 0;
  border-bottom: 1px solid rgba(184,149,106,0.07);
  transition: background 0.15s;
  animation: fadeIn 0.3s ease both;
}
.matrix-row:hover { background: rgba(184,149,106,0.04); }

.row-label {
  padding: 14px 12px 14px 0;
  display: flex; flex-direction: column; justify-content: center; gap: 3px;
}
.row-label-main {
  font-family: 'Noto Serif JP', serif;
  font-size: 13px; font-weight: 400;
  color: var(--parchment-dim);
  line-height: 1.4;
}
.row-label-sub {
  font-size: 11px; font-weight: 300;
  color: var(--parchment-faint);
  line-height: 1.4;
}

.matrix-cell {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 12px 4px;
  gap: 4px;
  position: relative;
}

/* STARS */
.stars {
  display: flex; gap: 2px;
  justify-content: center;
}
.star {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.star.filled { opacity: 0.9; }
.star.empty { background: rgba(255,255,255,0.08); }

/* CELL NOTE */
.cell-note {
  font-size: 9px; font-weight: 300;
  color: var(--parchment-faint);
  text-align: center;
  line-height: 1.3;
  max-width: 70px;
}

/* TOOLTIP */
.matrix-cell:hover .cell-tooltip { opacity: 1; pointer-events: auto; transform: translateY(0); }
.cell-tooltip {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%; transform: translateX(-50%) translateY(4px);
  background: #1e1a14;
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 10px 14px;
  min-width: 180px; max-width: 220px;
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: all 0.2s ease;
}
.cell-tooltip-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 11px; font-weight: 400;
  color: var(--gold); margin-bottom: 6px;
}
.cell-tooltip-body {
  font-size: 11px; font-weight: 300;
  color: var(--parchment-dim); line-height: 1.6;
}

/* LEGEND */
.legend {
  display: flex; flex-wrap: wrap; gap: 20px;
  margin-top: 40px; padding-top: 24px;
  border-top: 1px solid var(--border);
}
.legend-item {
  display: flex; align-items: center; gap: 10px;
}
.legend-dot {
  width: 10px; height: 10px; border-radius: 50%;
}
.legend-label {
  font-size: 11px; font-weight: 300;
  color: var(--parchment-faint); letter-spacing: 0.03em;
}

/* RESPONSIVE */
@media (max-width: 700px) {
  .denom-header { grid-template-columns: 120px repeat(8, 1fr); }
  .matrix-row { grid-template-columns: 120px repeat(8, 1fr); }
  .row-label-main { font-size: 11px; }
  .denom-header-cell .denom-abbr { display: none; }
  .star { width: 6px; height: 6px; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.btn-primary {
  display: inline-block;
  padding: 14px 28px;
  background: linear-gradient(135deg, var(--gold) 0%, #9a7a50 100%);
  border: none; border-radius: 2px;
  font-family: 'Noto Serif JP', serif;
  font-size: 14px; font-weight: 400;
  color: var(--ink); cursor: pointer;
  letter-spacing: 0.06em;
  text-decoration: none;
  transition: all 0.3s ease;
  margin-top: 32px;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(184,149,106,0.25); }
</style>
</head>

<div class="bg-layer"></div>

<div class="wrap">

    <div class="legend-item"><div class="legend-dot" style="background:var(--c-lutheran)"></div><span class="legend-label">ルーテル派</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--c-reformed)"></div><span class="legend-label">改革派</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--c-evangelical)"></div><span class="legend-label">福音派</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--c-pentecostal)"></div><span class="legend-label">ペンテコステ</span></div>

</div>

};

      {

// ===== CATEGORIES FOR FILTER =====
const allCategories = [...new Set(themes.map(t => t.category))];
let activeCategory = 'all';

function renderFilter() {
  const bar = document.getElementById('filter-bar');
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn' + (activeCategory === 'all' ? ' active' : '');
  allBtn.textContent = 'すべて';
  allBtn.onclick = () => { activeCategory = 'all'; renderAll(); };
  bar.appendChild(allBtn);

  allCategories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeCategory === cat ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { activeCategory = cat; renderAll(); };
    bar.appendChild(btn);
  });
}

function renderStars(val, color) {
  let html = '<div class="stars">';
  for (let i = 1; i <= 5; i++) {
    if (i <= val) {
      html += `<div class="star filled" style="background:${color}"></div>`;
    } else {
      html += `<div class="star empty"></div>`;
    }
  }
  html += '</div>';
  return html;
}

function renderMatrix() {
  const body = document.getElementById('matrix-body');
  body.innerHTML = '';

  const filtered = activeCategory === 'all'
    ? themes
    : themes.filter(t => t.category === activeCategory);

  filtered.forEach(group => {
    const groupEl = document.createElement('div');
    groupEl.className = 'theme-group';

    const titleEl = document.createElement('div');
    titleEl.className = 'theme-group-title';
    titleEl.textContent = group.category;
    groupEl.appendChild(titleEl);

    group.rows.forEach((row, ri) => {
      const rowEl = document.createElement('div');
      rowEl.className = 'matrix-row';
      rowEl.style.animationDelay = `${ri * 0.04}s`;

      // Label cell
      const labelEl = document.createElement('div');
      labelEl.className = 'row-label';
      labelEl.innerHTML = `
        <span class="row-label-main">${row.label}</span>
        <span class="row-label-sub">${row.sub}</span>
      `;
      rowEl.appendChild(labelEl);

      // Score cells
      denomKeys.forEach(key => {
        const score = row.scores[key];
        const color = `var(--c-${key})`;
        const cellEl = document.createElement('div');
        cellEl.className = 'matrix-cell';

        const valLabel = ['', '低', '低め', '中', '高め', '高'][score.val];

        cellEl.innerHTML = `
          ${renderStars(score.val, color)}
          <div class="cell-tooltip">
            <div class="cell-tooltip-title">${score.val}／5 — ${valLabel}</div>
            <div class="cell-tooltip-body">${score.note}</div>
          </div>
        `;
        rowEl.appendChild(cellEl);
      });

      groupEl.appendChild(rowEl);
    });

    body.appendChild(groupEl);
  });
}

function renderAll() {
  // Update filter buttons
  document.querySelectorAll('.filter-btn').forEach((btn, i) => {
    if (i === 0) btn.className = 'filter-btn' + (activeCategory === 'all' ? ' active' : '');
    else btn.className = 'filter-btn' + (activeCategory === allCategories[i-1] ? ' active' : '');
  });
  renderMatrix();
}

renderFilter();
renderMatrix();
