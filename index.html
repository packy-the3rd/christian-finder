<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キリスト教 入門ナビ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #b8956a;
    --gold-light: #d4b483;
    --gold-pale: #f5ede0;
    --ink: #1a1410;
    --ink-mid: #3d2f20;
    --ink-soft: #6b5742;
    --parchment: #faf6f0;
    --parchment-dark: #f0e8da;
    --white: #ffffff;
    --accent-blue: #2c4a6e;
    --accent-green: #2d5a3d;
    --accent-red: #7a2020;
    --accent-purple: #4a2d6e;
    --accent-teal: #1d4a4a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Serif JP', 'Cormorant Garamond', Georgia, serif;
    background: var(--ink);
    color: var(--parchment);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== BACKGROUND ===== */
  .bg-layer {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, #2c1f0e 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 100% 100%, #0d1a2a 0%, transparent 60%),
      linear-gradient(160deg, #0f0b07 0%, #1a1008 40%, #0a1018 100%);
    z-index: 0;
  }

  .cross-bg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    opacity: 0.03;
    z-index: 0;
    pointer-events: none;
  }
  .cross-bg::before {
    content: '✝';
    font-size: 500px;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: var(--gold);
  }

  /* ===== CONTAINER ===== */
  .container {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  .site-header {
    text-align: center;
    padding: 48px 0 40px;
    border-bottom: 1px solid rgba(184, 149, 106, 0.2);
    margin-bottom: 48px;
    animation: fadeDown 0.8s ease both;
  }

  .site-header .eyebrow {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    opacity: 0.8;
  }

  .site-header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 300;
    letter-spacing: 0.05em;
    line-height: 1.2;
    color: var(--parchment);
    margin-bottom: 8px;
  }

  .site-header h1 span {
    color: var(--gold);
    font-style: italic;
  }

  .site-header .subtitle {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 300;
    color: var(--ink-soft);
    color: rgba(240, 232, 218, 0.55);
    margin-top: 12px;
    letter-spacing: 0.05em;
  }

  /* ===== PROGRESS ===== */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
    animation: fadeIn 0.5s ease both;
  }

  .progress-bar-track {
    flex: 1;
    height: 2px;
    background: rgba(184, 149, 106, 0.15);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 100%);
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .progress-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 0.1em;
    white-space: nowrap;
    opacity: 0.8;
    min-width: 60px;
    text-align: right;
  }

  /* ===== QUESTION CARD ===== */
  .card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(184, 149, 106, 0.18);
    border-radius: 2px;
    padding: 40px 40px 36px;
    position: relative;
    animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
  }

  @media (max-width: 560px) {
    .card { padding: 28px 20px 24px; }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 40px; right: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.4;
  }

  .q-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 20px;
  }

  .q-text {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(17px, 3vw, 22px);
    font-weight: 400;
    line-height: 1.7;
    color: var(--parchment);
    margin-bottom: 8px;
  }

  .q-sub {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    font-weight: 300;
    color: rgba(240, 232, 218, 0.45);
    line-height: 1.6;
    margin-bottom: 32px;
    letter-spacing: 0.03em;
  }

  /* ===== OPTIONS ===== */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(184, 149, 106, 0.2);
    border-radius: 2px;
    padding: 16px 20px;
    text-align: left;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }

  .option-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(184,149,106,0.08) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  .option-btn:hover {
    border-color: rgba(184, 149, 106, 0.5);
    background: rgba(184, 149, 106, 0.06);
    transform: translateX(4px);
  }

  .option-btn:hover::after { opacity: 1; }

  .option-btn:active { transform: translateX(2px) scale(0.99); }

  .option-letter {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--gold);
    opacity: 0.7;
    min-width: 18px;
    margin-top: 2px;
    flex-shrink: 0;
  }

  .option-text {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: rgba(240, 232, 218, 0.85);
    line-height: 1.6;
    letter-spacing: 0.03em;
  }

  /* ===== INTRO / RESULT SCREENS ===== */
  .screen { animation: slideUp 0.6s cubic-bezier(0.4,0,0.2,1) both; }

  .intro-icon {
    font-size: 48px;
    text-align: center;
    margin-bottom: 24px;
    opacity: 0.7;
  }

  .intro-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 300;
    text-align: center;
    color: var(--parchment);
    margin-bottom: 20px;
    line-height: 1.4;
  }

  .intro-title em { color: var(--gold); font-style: italic; }

  .intro-body {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 300;
    line-height: 1.9;
    color: rgba(240, 232, 218, 0.65);
    text-align: center;
    margin-bottom: 36px;
    letter-spacing: 0.03em;
  }

  .btn-primary {
    display: block;
    width: 100%;
    padding: 18px 32px;
    background: linear-gradient(135deg, var(--gold) 0%, #9a7a50 100%);
    border: none;
    border-radius: 2px;
    font-family: 'Noto Serif JP', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--ink);
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(184,149,106,0.3); }
  .btn-primary:hover::before { opacity: 1; }

  .btn-secondary {
    display: block;
    width: 100%;
    padding: 14px 32px;
    background: transparent;
    border: 1px solid rgba(184, 149, 106, 0.3);
    border-radius: 2px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 300;
    color: rgba(240, 232, 218, 0.6);
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.3s ease;
    margin-top: 12px;
    text-align: center;
  }
  .btn-secondary:hover {
    border-color: rgba(184, 149, 106, 0.6);
    color: var(--parchment);
  }

  /* ===== RESULT ===== */
  .result-badge {
    text-align: center;
    margin-bottom: 32px;
  }

  .result-icon {
    font-size: 56px;
    display: block;
    margin-bottom: 12px;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s both;
  }

  .result-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 10px;
  }

  .result-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 400;
    color: var(--parchment);
    letter-spacing: 0.04em;
    line-height: 1.2;
  }

  .result-tagline {
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--gold-light);
    margin-top: 8px;
    font-style: italic;
  }

  .result-divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 28px auto;
    opacity: 0.5;
  }

  .result-section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.6;
    margin-bottom: 12px;
  }

  .result-desc {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 300;
    line-height: 1.9;
    color: rgba(240, 232, 218, 0.75);
    margin-bottom: 28px;
    letter-spacing: 0.03em;
  }

  .result-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
  }

  .tag {
    padding: 5px 14px;
    border: 1px solid rgba(184, 149, 106, 0.3);
    border-radius: 20px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: var(--gold-light);
    letter-spacing: 0.05em;
    opacity: 0.85;
  }

  .next-steps {
    background: rgba(184, 149, 106, 0.06);
    border: 1px solid rgba(184, 149, 106, 0.15);
    border-radius: 2px;
    padding: 24px;
    margin-bottom: 28px;
  }

  .next-steps ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .next-steps li {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 300;
    color: rgba(240, 232, 218, 0.7);
    line-height: 1.6;
    padding-left: 20px;
    position: relative;
    letter-spacing: 0.03em;
  }

  .next-steps li::before {
    content: '✝';
    position: absolute;
    left: 0;
    color: var(--gold);
    font-size: 10px;
    top: 3px;
    opacity: 0.6;
  }

  .score-bars {
    margin-bottom: 28px;
  }

  .score-bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .score-bar-label {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: rgba(240, 232, 218, 0.55);
    min-width: 100px;
    letter-spacing: 0.03em;
  }

  .score-bar-track {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }

  .score-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .score-bar-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    color: var(--gold);
    min-width: 30px;
    text-align: right;
    opacity: 0.8;
  }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="cross-bg"></div>

<div class="container">

  <!-- HEADER -->
  <header class="site-header">
    <p class="eyebrow">Christianity Navigator</p>
    <h1>キリスト教<br><span>入門ナビ</span></h1>
    <p class="subtitle">15の問いで、あなたの信仰スタイルを探る</p>
  </header>

  <!-- INTRO SCREEN -->
  <div id="screen-intro" class="card screen">
    <div class="intro-icon">✝</div>
    <p class="intro-title">キリスト教は<br><em>ひとつではない</em></p>
    <p class="intro-body">
      カトリック、プロテスタント、東方正教会——<br>
      それぞれに異なる礼拝の形、神学の強調点、共同体の文化がある。<br><br>
      15の問いに答えることで、あなたの気質・関心・学び方に<br>
      最も共鳴する宗派と入門スタイルを提示します。<br><br>
      正解も不正解もありません。<br>
      直感で選んでください。
    </p>
    <button class="btn-primary" onclick="startQuiz()">診断をはじめる</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="screen-quiz" class="hidden">
    <div class="progress-wrap">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <span class="progress-label" id="progress-label">0 / 10</span>
    </div>
    <div class="card" id="question-card">
      <p class="q-number" id="q-number">Question 1</p>
      <p class="q-text" id="q-text"></p>
      <p class="q-sub" id="q-sub"></p>
      <div class="options" id="options"></div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="screen-result" class="hidden card screen">
    <div class="result-badge">
      <span class="result-icon" id="result-icon"></span>
      <p class="result-label">あなたに最も合う宗派・スタイル</p>
      <p class="result-name" id="result-name"></p>
      <p class="result-tagline" id="result-tagline"></p>
    </div>
    <div class="result-divider"></div>
    <p class="result-section-title">この宗派について</p>
    <p class="result-desc" id="result-desc"></p>
    <div class="result-tags" id="result-tags"></div>
    <p class="result-section-title">傾向スコア</p>
    <div class="score-bars" id="score-bars"></div>
    <p class="result-section-title">あなたへの入門ステップ</p>
    <div class="next-steps">
      <ul id="next-steps"></ul>
    </div>
    <button class="btn-primary" onclick="restartQuiz()">もう一度診断する</button>
    <button class="btn-secondary" onclick="showAllDenominations()">全宗派の概要を見る</button>
  </div>

  <!-- ALL DENOMINATIONS -->
  <div id="screen-all" class="hidden">
    <div id="all-denom-content"></div>
    <button class="btn-secondary" onclick="backToResult()" style="margin-top:20px">← 結果に戻る</button>
  </div>

</div>

<script>
// ===== QUESTIONS =====
const questions = [
  {
    text: "礼拝の場に求めるものは何ですか？",
    sub: "初めて教会の扉を開けたとき、どんな空間であってほしいか想像してください。",
    options: [
      { text: "神聖な荘厳さ。ステンドグラス、香、厳かな儀式の中に身を置きたい", scores: { catholic: 3, orthodox: 3, anglican: 1 } },
      { text: "シンプルで温かい。長い説教より、歌と分かち合いがある場", scores: { evangelical: 3, pentecostal: 2 } },
      { text: "品位ある伝統。古典的な典礼と穏やかな共同体", scores: { anglican: 3, lutheran: 2, reformed: 1 } },
      { text: "静けさと内省。できれば個人で聖書を読み、神と向き合いたい", scores: { solo: 3, reformed: 1 } },
    ]
  },
  {
    text: "「権威」の根拠として、どれが最も納得できますか？",
    sub: "何を信仰の判断基準にするか、という問いです。",
    options: [
      { text: "聖書＋使徒から連なる教会の伝統（マジステリウム）の両方", scores: { catholic: 3, orthodox: 2 } },
      { text: "聖書のみ（Sola Scriptura）—— 個人が直接聖書を読んで判断する", scores: { evangelical: 3, reformed: 3, lutheran: 2, solo: 2 } },
      { text: "聖書と長い歴史的伝統のバランス。どちらも無視できない", scores: { anglican: 3, lutheran: 2 } },
      { text: "聖書＋聖霊の直接的な導き・体験", scores: { pentecostal: 3, evangelical: 1 } },
    ]
  },
  {
    text: "「救い」についての理解として、しっくりくるのは？",
    sub: "神学的な核心部分。直感で選んで構いません。",
    options: [
      { text: "信仰と善行の両方が必要。秘跡（洗礼・聖餐など）を通じて与えられる", scores: { catholic: 3, orthodox: 2, anglican: 1 } },
      { text: "信仰のみ（Sola Fide）。神の恵みを受け取る行為が救いの核心", scores: { lutheran: 3, reformed: 2, evangelical: 2 } },
      { text: "個人の回心体験（Born Again）が決定的な転換点", scores: { evangelical: 3, pentecostal: 2 } },
      { text: "まだよく分からない。まずは神の存在から考えたい", scores: { solo: 2, reformed: 1, lutheran: 1 } },
    ]
  },
  {
    text: "知的・学問的な信仰に対してどう思いますか？",
    sub: "哲学、神学、歴史批評——信仰は知性と対話できるか。",
    options: [
      { text: "重要。信仰は理性的に問い続けることで深まる（知性的信仰）", scores: { catholic: 2, reformed: 3, lutheran: 2, solo: 2 } },
      { text: "大切だが、神学論争より実践と体験のほうが先にある", scores: { evangelical: 2, pentecostal: 3 } },
      { text: "豊かな神学的伝統を学ぶことで信仰が安定すると感じる", scores: { reformed: 2, anglican: 2, orthodox: 2 } },
      { text: "まず自分で文献を読んで考えたい。組織的な学びより独学派", scores: { solo: 3, reformed: 1 } },
    ]
  },
  {
    text: "共同体（コミュニティ）への関与について",
    sub: "信仰生活に他者がどれほど必要か。",
    options: [
      { text: "深く関与したい。洗礼準備、成人式（堅信礼）など段階的に受け入れられる共同体に入りたい", scores: { catholic: 3, orthodox: 3, anglican: 1 } },
      { text: "中程度。週1礼拝と小グループ程度なら参加できる", scores: { evangelical: 2, lutheran: 2, anglican: 2 } },
      { text: "熱い共同体。一緒に祈り、歌い、御霊の働きを体験する場", scores: { pentecostal: 3 } },
      { text: "最小限。信仰は個人のものであり、組織への帰属は重くしたくない", scores: { solo: 3, reformed: 1 } },
    ]
  },
  {
    text: "「神の選び・予定説」についての感覚は？",
    sub: "神が人を予め救いに定めているという概念について。",
    options: [
      { text: "すっきりする。神の主権が絶対であることは信仰の基盤になる", scores: { reformed: 3 } },

// ===== STATE =====
let currentQ = 0;
let scores = { catholic:0, orthodox:0, anglican:0, lutheran:0, reformed:0, evangelical:0, pentecostal:0, solo:0 };
let answers = [];
let lastResult = null;

const letters = ['A', 'B', 'C', 'D'];

function startQuiz() {
  currentQ = 0;
  scores = { catholic:0, orthodox:0, anglican:0, lutheran:0, reformed:0, evangelical:0, pentecostal:0, solo:0 };
  answers = [];
  show('screen-quiz');
  renderQuestion();
}

function show(id) {
  ['screen-intro','screen-quiz','screen-result','screen-all'].forEach(s => {
    document.getElementById(s).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

function renderQuestion() {
  const q = questions[currentQ];
  const pct = (currentQ / questions.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${currentQ} / ${questions.length}`;
  document.getElementById('q-number').textContent = `Question ${currentQ + 1}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-sub').textContent = q.sub;

  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'slideUp 0.4s cubic-bezier(0.4,0,0.2,1) both';

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span class="option-text">${opt.text}</span>`;
    btn.onclick = () => selectOption(i, opt.scores);
    opts.appendChild(btn);
  });
}

function selectOption(idx, optScores) {
  // Disable all buttons briefly
  document.querySelectorAll('.option-btn').forEach(b => b.style.pointerEvents = 'none');

  Object.entries(optScores).forEach(([key, val]) => {
    scores[key] = (scores[key] || 0) + val;
  });
  answers.push(idx);
  currentQ++;

  if (currentQ >= questions.length) {
    setTimeout(showResult, 300);
  } else {
    setTimeout(() => {
      renderQuestion();
      document.querySelectorAll('.option-btn').forEach(b => b.style.pointerEvents = '');
    }, 200);
  }
}

function showResult() {
  // Find top denomination
  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  const topKey = sorted[0][0];
  const d = denominations[topKey];
  lastResult = topKey;

  document.getElementById('result-icon').textContent = d.icon;
  document.getElementById('result-name').textContent = d.name;
  document.getElementById('result-tagline').textContent = d.tagline;
  document.getElementById('result-desc').textContent = d.desc;

  // Tags
  const tagsEl = document.getElementById('result-tags');
  tagsEl.innerHTML = d.tags.map(t => `<span class="tag">${t}</span>`).join('');

  // Score bars
  const barsEl = document.getElementById('score-bars');
  const maxScore = sorted[0][1] || 1;
  const denomNames = {
    catholic:'カトリック', orthodox:'東方正教', anglican:'聖公会',
    lutheran:'ルーテル', reformed:'改革派', evangelical:'福音派',
    pentecostal:'ペンテコステ', solo:'独学スタイル'
  };
  const barColors = {
    catholic:'#4a6e8a', orthodox:'#8a6a4a', anglican:'#2d5a3d',
    lutheran:'#7a5a3d', reformed:'#3d4a7a', evangelical:'#7a6a3d',
    pentecostal:'#7a3d3d', solo:'#5a5a5a'
  };

  barsEl.innerHTML = sorted.map(([key, val]) => {
    const pct = Math.round((val / maxScore) * 100);
    return `
      <div class="score-bar-row">
        <span class="score-bar-label">${denomNames[key]}</span>
        <div class="score-bar-track">
          <div class="score-bar-fill" style="width:0%;background:${barColors[key]}" data-target="${pct}"></div>
        </div>
        <span class="score-bar-val">${pct}%</span>
      </div>`;
  }).join('');

  // Steps
  const stepsEl = document.getElementById('next-steps');
  stepsEl.innerHTML = d.steps.map(s => `<li>${s}</li>`).join('');

  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-label').textContent = `${questions.length} / ${questions.length}`;

  show('screen-result');

  // Animate bars after render
  setTimeout(() => {
    document.querySelectorAll('.score-bar-fill').forEach(el => {
      el.style.transition = 'width 1s cubic-bezier(0.4,0,0.2,1)';
      el.style.width = el.dataset.target + '%';
    });
  }, 200);
}

function restartQuiz() {
  show('screen-intro');
}

function showAllDenominations() {
  const container = document.getElementById('all-denom-content');
  container.innerHTML = Object.entries(denominations).map(([key, d]) => `
    <div class="card screen" style="margin-bottom:20px; border-color: ${d.color}40;">
      <div style="display:flex; gap:16px; align-items:flex-start; margin-bottom:16px;">
        <span style="font-size:32px; opacity:0.8">${d.icon}</span>
        <div>
          <p style="font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:400; color:var(--parchment)">${d.name}</p>
          <p style="font-family:'Noto Serif JP',serif; font-size:12px; color:${d.color}; margin-top:4px; opacity:0.9">${d.tagline}</p>
        </div>
      </div>
      <p style="font-family:'Noto Sans JP',sans-serif; font-size:13px; font-weight:300; line-height:1.8; color:rgba(240,232,218,0.65); margin-bottom:14px; letter-spacing:0.03em">${d.desc}</p>
      <div style="display:flex; flex-wrap:wrap; gap:6px">
        ${d.tags.map(t => `<span class="tag" style="border-color:${d.color}50; color:${d.color}">${t}</span>`).join('')}
      </div>
    </div>
  `).join('');
  show('screen-all');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function backToResult() {
  show('screen-result');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
