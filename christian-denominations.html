      "神学的に開かれた雰囲気の教会が多いので、牧師に率直に疑問をぶつけてみる",
      "読書：日本基督教団の入門資料または『会衆派の歴史と神学』",
      "読書・議論を重視する聖書研究会への参加から始める",
    ]
  },
  {
    key: "solo",
    name: "独学・個人帰依スタイル",
    tagline: "—— 組織より先に、まず神と向き合う",
    icon: "📖",
    color: "#5a5a5a",
    category: "独学",
    desc: "特定の宗派に入る前に、まず自分で聖書を読み、神学を学び、信仰の輪郭を自分で確かめたい——そういう気質を持つ人がいる。これは弱さではなく、知性的誠実さの表れだ。良質な書籍・オンライン資源を使いながら、必要に応じて複数の教会を訪問する「巡礼的」アプローチが向く。",
    tags: ["独学・知的探究", "複数宗派の比較", "組織帰属を急がない", "自律的信仰形成", "文献中心"],
    url: "https://uccj.org/",
    urlLabel: "日本基督教団（入門として）",
    steps: [
      "まず聖書を通読する（新約聖書から。新改訳2017または新共同訳）",
      "読書：C.S.ルイス『驚かされた喜び』、マクグラス『キリスト教神学入門』",
      "複数の宗派の礼拝を「見学者」として訪問し比較する",
      "ティム・ケラー『懐疑する人のための神』——信仰の知的障壁を丁寧に論じた良著",
    ]
  },
];

const categories = ['すべて', '典礼派', '中道派', 'プロテスタント', '体験派', '独学'];
let activeCategory = 'すべて';

function renderFilter() {
  const bar = document.getElementById('filter-bar');
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === activeCategory ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => {
      activeCategory = cat;
      document.querySelectorAll('.filter-btn').forEach((b, i) => {
        b.className = 'filter-btn' + (categories[i] === activeCategory ? ' active' : '');
      });
      renderList();
    };
    bar.appendChild(btn);
  });
}

function renderList() {
  const list = document.getElementById('denom-list');
  const filtered = activeCategory === 'すべて'
    ? denominations
    : denominations.filter(d => d.category === activeCategory);

  list.innerHTML = '';
  filtered.forEach((d, i) => {
    const card = document.createElement('div');
    card.className = 'denom-card';
    card.style.animationDelay = `${i * 0.05}s`;
    card.style.borderColor = d.color + '40';

    card.innerHTML = `
      <div class="card-head">
        <span class="card-icon">${d.icon}</span>
        <div class="card-title-wrap">
          <p class="card-name">${d.name}</p>
          <p class="card-tagline" style="color:${d.color}">${d.tagline}</p>
        </div>
      </div>
      <p class="card-desc">${d.desc}</p>
      <div class="card-tags">
        ${d.tags.map(t => `<span class="tag" style="border-color:${d.color}50; color:${d.color}">${t}</span>`).join('')}
      </div>
      <div class="card-steps">
        <p class="steps-label">入門ステップ</p>
        <ul class="steps-list">
          ${d.steps.map(s => `<li>${s}</li>`).join('')}
        </ul>
      </div>
      <a href="${d.url}" target="_blank" rel="noopener noreferrer"
        class="official-link"
        style="color:${d.color}; border-color:${d.color}50;"
        onmouseover="this.style.background='${d.color}15'"
        onmouseout="this.style.background='transparent'">
        ✝ ${d.urlLabel} →
      </a>
    `;
    list.appendChild(card);
  });
}

renderFilter();
renderList();
</script>
</body>
</html>
